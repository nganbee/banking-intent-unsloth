# Model config
model:
  model_name: "unsloth/Qwen2.5-3B-bnb-4bit"
  max_seq_length: 1024
  load_in_4bit: true
  hf_name: "imbee510/bank-intent-qwen-unsloth"

data:
  train_path: "sample_data/train.csv"
  test_path: "sample_data/test.csv"
  num_classes: 77

# Hyperparameter Config
training:
  output_dir: "checkpoints/"
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  num_train_epochs: 3
  optimizer: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  seed: 42

# LoRA Config
lora:
  r: 16
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lora_alpha: 16
  lora_dropout: 0